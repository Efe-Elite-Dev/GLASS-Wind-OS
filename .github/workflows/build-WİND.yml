name: Sky-Core-OS Auto-Build-v1.5

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc-multilib

      - name: Clean, Compile and Link Complete OS
        run: |
          rm -f *.o kernel.bin
          nasm -f elf32 boot.asm -o boot.o
          gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c *.c
          ld -m elf_i386 -T linker.ld -o kernel.bin *.o

      # Etiket (Tag) derdi olmadan kernel.bin dosyasını doğrudan GitHub Actions panelinden indirmek için:
      - name: Upload Kernel Binary
        uses: actions/upload-artifact@v4
        with:
          name: SkyCore-Kernel-Output
          path: kernel.bin

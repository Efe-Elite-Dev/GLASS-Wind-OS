name: Sky-Core-OS Auto-Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: |
          sudo apt-get install -y nasm gcc-multilib
          nasm -f elf32 boot.asm -o boot.o
          # Tüm C dosyalarını derle
          gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c *.c
          # Hepsini kernel.bin'de bağla
          ld -m elf_i386 -T linker.ld -o kernel.bin *.o
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: kernel.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
